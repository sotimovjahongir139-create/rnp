# RNP Analytics — new nginx server block (does NOT touch other vhosts on odin).
# certbot will later add the listen 443 / ssl_* lines + an HTTP->HTTPS redirect
# automatically (see deploy/tls-watch.sh) once DNS for the name points at this box.
server {
    listen 80;
    listen [::]:80;
    server_name rnp.arcon-group.uz;

    root /home/admin/rnp/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3008;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
